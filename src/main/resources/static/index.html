<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">

        <h1>💰 Smart Expense Tracker</h1>

        <!-- ADD EXPENSE -->
        <div class="card">
            <h2>Add Expense</h2>
            <div class="form-row">
                <input type="number" id="amount" placeholder="Amount (₹)" />
                <div class="category-wrap">
                    <select id="category" onchange="handleCategoryChange()">
                        <option>Food</option>
                        <option>Travel</option>
                        <option>Shopping</option>
                        <option>Bills</option>
                        <option>Entertainment</option>
                        <option>Grocery</option>
                        <option>Health</option>
                        <option>Education</option>
                        <option>Other (type below)</option>
                    </select>
                    <input type="text" id="custom-category" placeholder="Type custom category..." class="hidden" />
                </div>
                <input type="date" id="date" />
                <input type="text" id="description" placeholder="Description" />
                <button onclick="addExpense()">Add</button>
            </div>
        </div>

        <!-- FILTER -->
        <div class="card">
            <h2>View Expenses</h2>
            <div class="toggle-row">
                <button class="toggle-btn active" id="btn-monthly" onclick="switchView('monthly')">Monthly</button>
                <button class="toggle-btn" id="btn-yearly" onclick="switchView('yearly')">Yearly</button>
                <select id="year-select" onchange="loadFiltered()">
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                </select>
                <select id="month-select" onchange="loadFiltered()">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
        </div>

        <!-- STAT CARDS -->
        <div class="stats-grid" id="stats-grid"></div>

        <!-- CHARTS -->
        <div class="charts-row">
            <div class="card chart-card">
                <h2>Spending by Category</h2>
                <canvas id="pieChart" width="260" height="260"></canvas>
            </div>
            <div class="card chart-card" id="bar-card" style="display:none">
                <h2>Monthly Trend</h2>
                <canvas id="barChart" width="260" height="260"></canvas>
            </div>
        </div>

        <!-- AI INSIGHTS -->
        <div class="card">
            <h2>AI Insights ✨</h2>
            <button class="ai-btn" onclick="getInsights()">Generate AI Insights</button>
            <div id="insights-box" class="insights-box hidden"></div>
        </div>

        <!-- TABLE -->
        <div class="card">
            <h2 id="table-heading">Expenses — May 2026</h2>
            <table>
                <thead>
                    <tr>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expense-body"></tbody>
            </table>
            <p id="total"></p>
        </div>

    </div>

    <script>
        const BASE = 'http://localhost:8080/api';
        let pieChart = null, barChart = null;
        let currentView = 'monthly';

        const monthNames = ['', 'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'];

        const now = new Date();
        window.onload = () => {
            document.getElementById('month-select').value = now.getMonth() + 1;
            document.getElementById('year-select').value = now.getFullYear();
            loadFiltered();
        };

        function handleCategoryChange() {
            const sel = document.getElementById('category').value;
            const custom = document.getElementById('custom-category');
            if (sel === 'Other (type below)') {
                custom.classList.remove('hidden');
            } else {
                custom.classList.add('hidden');
                custom.value = '';
            }
        }

        function getFinalCategory() {
            const sel = document.getElementById('category').value;
            if (sel === 'Other (type below)') {
                const custom = document.getElementById('custom-category').value.trim();
                return custom || 'Other';
            }
            return sel;
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('btn-monthly').classList.toggle('active', view === 'monthly');
            document.getElementById('btn-yearly').classList.toggle('active', view === 'yearly');
            document.getElementById('month-select').style.display = view === 'monthly' ? 'inline-block' : 'none';
            loadFiltered();
        }

        async function loadFiltered() {
            const year = document.getElementById('year-select').value;
            const month = document.getElementById('month-select').value;

            // Update table heading
            const heading = currentView === 'monthly'
                ? `${monthNames[parseInt(month)]} ${year} Expenses`
                : `${year} Expenses`;
            document.getElementById('table-heading').textContent = heading;

            // Fetch filtered expenses
            const url = currentView === 'monthly'
                ? `${BASE}/expenses/monthly?year=${year}&month=${month}`
                : `${BASE}/expenses/yearly?year=${year}`;

            const res = await fetch(url);
            const expenses = await res.json();
            renderTable(expenses);
            updatePieChart(expenses);

            // Fetch analysis
            const aUrl = currentView === 'monthly'
                ? `${BASE}/analysis?year=${year}&month=${month}`
                : `${BASE}/analysis?year=${year}`;

            const aRes = await fetch(aUrl);
            const analysis = await aRes.json();
            renderAnalysis(analysis);

            // Bar chart only for yearly
            if (currentView === 'yearly' && analysis.monthlyTotals) {
                document.getElementById('bar-card').style.display = 'block';
                updateBarChart(analysis.monthlyTotals);
            } else {
                document.getElementById('bar-card').style.display = 'none';
            }
        }

        function renderAnalysis(a) {
            if (a.message) {
                document.getElementById('stats-grid').innerHTML =
                    `<div class="stat-card"><span class="stat-label">Status</span><span class="stat-value" style="font-size:16px">${a.message}</span></div>`;
                return;
            }

            const vsLastMonth = a.comparedToLastMonth
                ? `<div class="stat-card ${a.comparedToLastMonth.startsWith('+') ? 'danger' : 'success'}">
          <span class="stat-label">vs Last Month</span>
          <span class="stat-value" style="font-size:16px">${a.comparedToLastMonth}</span>
          <span class="stat-sub">Last month: ₹${Number(a.lastMonthTotal).toFixed(0)}</span>
         </div>` : '';

            document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card">
        <span class="stat-label">Total Spent</span>
        <span class="stat-value">₹${Number(a.totalSpent).toFixed(0)}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Transactions</span>
        <span class="stat-value">${a.totalTransactions}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Avg per Transaction</span>
        <span class="stat-value">₹${Number(a.averagePerTransaction).toFixed(0)}</span>
      </div>
      <div class="stat-card highlight">
        <span class="stat-label">Top Category</span>
        <span class="stat-value" style="font-size:18px">${a.highestCategory}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Highest Spending Day</span>
        <span class="stat-value" style="font-size:16px">${a.highestSpendingDay}</span>
        <span class="stat-sub">₹${Number(a.highestSpendingDayAmount).toFixed(0)}</span>
      </div>
      ${vsLastMonth}
    `;
        }

        async function addExpense() {
            const amount = document.getElementById('amount').value;
            const category = getFinalCategory();
            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value;

            if (!amount || !date) { alert('Please enter amount and date'); return; }

            await fetch(`${BASE}/expenses`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount, category, date, description })
            });

            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('custom-category').value = '';
            loadFiltered();
        }

        function getBadgeColor(category) {
            const colors = {
                'food': 'background:#ffe0e6;color:#c1121f',
                'travel': 'background:#dbeafe;color:#1d4ed8',
                'shopping': 'background:#fef9c3;color:#854d0e',
                'bills': 'background:#d1fae5;color:#065f46',
                'entertainment': 'background:#ede9fe;color:#5b21b6',
                'grocery': 'background:#dcfce7;color:#166534',
                'health': 'background:#fee2e2;color:#991b1b',
                'education': 'background:#e0f2fe;color:#075985',
            };
            return colors[category.toLowerCase()] || 'background:#f3f4f6;color:#374151';
        }

        function renderTable(expenses) {
            const tbody = document.getElementById('expense-body');
            tbody.innerHTML = '';
            let total = 0;

            if (expenses.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#888;padding:20px">No expenses for this period</td></tr>`;
                document.getElementById('total').textContent = '';
                return;
            }

            expenses.forEach(e => {
                total += e.amount;
                tbody.innerHTML += `
        <tr>
          <td><b>₹${e.amount}</b></td>
          <td><span class="badge" style="${getBadgeColor(e.category)}">${e.category}</span></td>
          <td>${e.date}</td>
          <td>${e.description || '-'}</td>
          <td><button class="del-btn" onclick="deleteExpense(${e.id})">Delete</button></td>
        </tr>`;
            });

            document.getElementById('total').textContent = `Total Spent: ₹${total.toFixed(2)}`;
        }

        async function deleteExpense(id) {
            await fetch(`${BASE}/expenses/${id}`, { method: 'DELETE' });
            loadFiltered();
        }

        async function getInsights() {
            const box = document.getElementById('insights-box');
            box.classList.remove('hidden');
            box.innerHTML = '⏳ Analyzing your expenses with AI...';
            const res = await fetch(`${BASE}/insights`);
            const text = await res.text();
            box.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        }

        function updatePieChart(expenses) {
            const categoryMap = {};
            expenses.forEach(e => {
                categoryMap[e.category] = (categoryMap[e.category] || 0) + e.amount;
            });
            const labels = Object.keys(categoryMap);
            const data = Object.values(categoryMap);
            const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', '#7BC8A4'];

            if (pieChart) pieChart.destroy();
            pieChart = new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length) }] },
                options: { responsive: false }
            });
        }

        function updateBarChart(monthlyTotals) {
            const labels = Object.keys(monthlyTotals);
            const data = Object.values(monthlyTotals);
            if (barChart) barChart.destroy();
            barChart = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{ label: 'Monthly Spending (₹)', data, backgroundColor: '#4361ee', borderRadius: 6 }]
                },
                options: { responsive: false, scales: { y: { beginAtZero: true } } }
            });
        }
    </script>
</body>

</html>
